<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Poppigo · Q-Com Recon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#0F1E3E; --navy2:#132444; --ink:#0A1530; --panel:#14264a;
    --line:#22386a; --coral:#E85D4C; --coral-dim:#c14a3b;
    --gold:#C9A876; --teal:#3Fb0a0; --mute:#8fa3c9; --text:#EAF0FB; --white:#fff;
    --good:#3Fb0a0; --warn:#E8B84C; --bad:#E85D4C;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1200px 600px at 80% -10%, #1a2f57 0%, transparent 60%),
      var(--ink);
    color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1240px;margin:0 auto;padding:22px 20px 80px}
  header{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:22px;flex-wrap:wrap;gap:14px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.5px}
  .brand .dot{color:var(--coral)}
  .brand .sub{color:var(--gold);font-size:11px;letter-spacing:3px;font-weight:700;text-transform:uppercase}
  .loadbar{display:flex;align-items:center;gap:10px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:10px 16px;font-size:13px;color:var(--mute);
    cursor:pointer;transition:.15s;background:rgba(255,255,255,.02)}
  .drop:hover{border-color:var(--coral);color:var(--text)}
  .drop b{color:var(--coral)}
  .meta{font-size:11px;color:var(--mute)}
  .grid{display:grid;gap:16px}
  .cards{grid-template-columns:repeat(4,1fr)}
  @media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
  .card{background:linear-gradient(180deg,var(--panel),var(--navy2));
    border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .card .k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mute);font-weight:700}
  .card .v{font-size:30px;font-weight:800;margin-top:6px;letter-spacing:-1px}
  .card .v small{font-size:14px;color:var(--mute);font-weight:600}
  .card .foot{font-size:11px;color:var(--mute);margin-top:4px}
  .section{background:linear-gradient(180deg,var(--panel),var(--navy2));
    border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-top:18px}
  .section h2{margin:0 0 3px;font-size:15px;font-weight:800;letter-spacing:-.2px}
  .section .desc{color:var(--mute);font-size:12px;margin:0 0 16px;line-height:1.5}
  .lb-row{display:grid;grid-template-columns:210px 1fr 92px;align-items:center;gap:14px;padding:7px 0;
    border-bottom:1px solid rgba(255,255,255,.04)}
  .lb-row:last-child{border-bottom:0}
  .lb-name{font-size:13px;font-weight:600}
  .lb-name span{color:var(--mute);font-weight:500;font-size:11px}
  .lb-track{height:20px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;position:relative}
  .lb-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--coral-dim),var(--coral));
    display:flex;align-items:center;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .lb-val{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:14px}
  .lb-val small{color:var(--mute);font-weight:500;font-size:10px;display:block}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap}
  th{color:var(--mute);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;font-weight:700;cursor:pointer;user-select:none}
  th:hover{color:var(--text)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.ok{background:rgba(63,176,160,.15);color:var(--good)}
  .pill.low{background:rgba(232,184,76,.15);color:var(--warn)}
  .pill.oos{background:rgba(232,93,76,.16);color:var(--bad)}
  .plat{font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:5px}
  .plat.blinkit{background:#F8CE3B22;color:#F8CE3B}
  .plat.zepto{background:#7A3FE822;color:#b79bf0}
  .plat.instamart{background:#E8663322;color:#f0a07e}
  tr.own td{background:rgba(232,93,76,.07)}
  .ownbadge{background:var(--coral);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:.5px}
  .lb-row.own .lb-name{color:var(--coral)}
  .lb-row.own .lb-fill{background:linear-gradient(90deg,#C9A876,#E8B84C)}
  .brandbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .bchip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--mute);cursor:pointer;user-select:none;transition:.12s}
  .bchip:hover{border-color:var(--coral);color:var(--text)}
  .bchip.on{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:700}
  .bchip.own{border-color:var(--gold);color:var(--gold)}
  .bchip.own.on{background:var(--gold);color:#10203f}
  .controls{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .ctl{display:flex;flex-direction:column;gap:5px}
  .ctl label{font-size:11px;color:var(--mute);letter-spacing:.5px}
  .ctl input[type=range]{width:180px;accent-color:var(--coral)}
  .ctl .valout{font-weight:700;color:var(--gold)}
  select{background:var(--navy);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.two{grid-template-columns:1fr}}
  .empty{text-align:center;color:var(--mute);padding:60px 20px}
  .empty h3{color:var(--text);font-weight:700}
  .note{font-size:11px;color:var(--mute);margin-top:12px;line-height:1.5;border-left:2px solid var(--gold);padding-left:12px}
  canvas{max-height:280px}
  .chip{font-size:10px;color:var(--mute);border:1px solid var(--line);border-radius:20px;padding:3px 9px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div>
        <div class="sub">Competitor Recon</div>
        <h1>Poppigo Q-Com<span class="dot">.</span></h1>
      </div>
    </div>
    <div class="loadbar">
      <label class="drop" id="drop">Drop <b>snapshots.csv</b> here or click to load
        <input id="file" type="file" accept=".csv" style="display:none"/>
      </label>
      <div class="meta" id="meta">no data loaded</div>
    </div>
  </header>

  <div id="app">
    <div class="empty" id="empty">
      <h3>Load your snapshots.csv to see the war room</h3>
      <p>Everything is computed in your browser. Nothing leaves this page.<br>
      The file is produced by <b>tracker.py</b> and lives in the <b>data/</b> folder.</p>
    </div>
  </div>
</div>

<script>
const F = new Intl.NumberFormat('en-IN');
const money = n => '₹'+F.format(Math.round(n));
const DARK = {blinkit:1500, zepto:900, instamart:700};
let RAW=[], PEN=0.35;

// ---- AUTO-LOAD: try to fetch the CSV sitting next to this page (GitHub Pages) ----
async function autoload(){
  // ONLY ever load real collected data. No sample/demo fallback -- showing
  // fabricated numbers as if they were real would be worse than showing nothing.
  const tries=['data/snapshots.csv','snapshots.csv'];
  for(const u of tries){
    try{
      const r=await fetch(u+'?t='+Date.now());
      if(!r.ok) continue;
      const txt=await r.text();
      if(!txt || txt.length<50) continue;
      const res=Papa.parse(txt,{header:true,skipEmptyLines:true});
      const rows=res.data.filter(x=>x.brand_sku);
      if(!rows.length) continue;
      RAW=rows; render();
      window.__loaded=true;
      document.getElementById('drop').innerHTML=
        'Live data \u2014 auto-updated. <b>Click to load a different file</b>'+
        '<input id="file" type="file" accept=".csv" style="display:none"/>';
      wireFile();
      return true;
    }catch(e){}
  }
  return false;
}
function wireFile(){
  const f=document.getElementById('file');
  if(f) f.onchange=e=>{ if(e.target.files[0]) read(e.target.files[0]); };
  document.getElementById('drop').onclick=()=>document.getElementById('file').click();
}
document.addEventListener('DOMContentLoaded',async ()=>{
  const ok=await autoload();
  if(!ok){
    document.getElementById('empty').innerHTML=
      '<h3>No data collected yet</h3>'+
      '<p>The tracker has not saved a snapshot to <b>data/snapshots.csv</b> yet.<br>'+
      'Go to the <b>Actions</b> tab in GitHub and run <b>Snapshot + publish dashboard</b>, '+
      'or just wait for the next hourly run.</p>'+
      '<p style="color:#8fa3c9;font-size:12px;margin-top:18px">'+
      'This page will never show demo or placeholder numbers. '+
      'If there is no real data, it shows nothing.</p>';
  }
});
document.getElementById('drop').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{ if(e.target.files[0]) read(e.target.files[0]); };
['dragover','dragenter'].forEach(ev=>document.getElementById('drop').addEventListener(ev,e=>{e.preventDefault();}));
document.getElementById('drop').addEventListener('drop',e=>{e.preventDefault(); if(e.dataTransfer.files[0]) read(e.dataTransfer.files[0]);});

function read(file){
  Papa.parse(file,{header:true,dynamicTyping:false,skipEmptyLines:true,
    complete:res=>{ RAW=res.data.filter(r=>r.brand_sku); render(); }});
}

function toNum(x){ const n=parseFloat(x); return isNaN(n)?null:n; }

// --- depletion engine: MUST match depletion.py exactly ---
// A restock (stock goes UP) HIDES that interval's sales. Counting it as zero
// sales would under-count fast-moving brands -- a real bias. So we DROP restock
// intervals and compute a rate from clean intervals only, then scale to a day.
const ACTIVE_HOURS=15, MIN_H=0.25, MAX_H=6;

function rateFromSeries(pts){
  pts=pts.slice().sort((a,b)=>a.t-b.t);
  let cleanUnits=0, cleanHours=0, dirtyHours=0, dirty=0, intervals=0;
  for(let i=1;i<pts.length;i++){
    const h=(pts[i].t-pts[i-1].t)/3600000;
    if(h<MIN_H||h>MAX_H) continue;
    intervals++;
    const delta=pts[i].inv-pts[i-1].inv;
    if(delta>0){ dirty++; dirtyHours+=h; }      // restock -> unknowable, DROP
    else { cleanUnits+=-delta; cleanHours+=h; } // clean -> exact
  }
  if(cleanHours<=0) return {upd:0,cleanUnits:0,cleanHours:0,dirty,intervals,coverage:0,conf:'none'};
  const uph=cleanUnits/cleanHours;
  const tot=cleanHours+dirtyHours;
  const conf = cleanHours>=40?'high' : cleanHours>=12?'medium' : cleanHours>=3?'low' : 'none';
  return {upd:uph*ACTIVE_HOURS, cleanUnits, cleanHours, dirty, intervals,
          coverage: tot? cleanHours/tot : 0, conf};
}

function analyze(rows){
  const g={};
  rows.forEach(r=>{
    const inv=toNum(r.inventory); if(inv===null) return;
    // merchant_id = the dark store. Never diff stock across DIFFERENT stores.
    // platform_product_id is the ONLY unique SKU key (names+sizes collide).
    // merchant_id keeps us from diffing stock across different dark stores.
    const pid=r.platform_product_id||r.brand_sku;
    const key=[r.platform,pid,r.location,r.merchant_id||''].join('|');
    (g[key]=g[key]||[]).push({t:new Date(r.snapshot_ts_ist),inv,price:toNum(r.price),
      pid, brandName:r.brand, skuName:r.brand_sku, size:r.size,
      own:String(r.is_own).toLowerCase()==='true'});
  });
  const per={};
  Object.entries(g).forEach(([key,arr])=>{
    if(arr.length<2) return;
    const r=rateFromSeries(arr);
    if(r.conf==='none') return;                 // honestly not enough data yet
    const plat=key.split('|')[0];
    const a0=arr[0];
    const k2=[plat,a0.pid].join('|');          // roll stores up per unique SKU
    const prices=arr.map(a=>a.price).filter(x=>x!=null);
    const avgP=prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:null;
    if(!per[k2]) per[k2]={plat,brand:a0.skuName,size:a0.size,pid:a0.pid,
                          upds:[],prices:[],cleanHours:0,restocks:0,
                          brandName:a0.brandName||'',own:!!a0.own,conf:r.conf,cov:0,n:0};
    const o=per[k2];
    o.upds.push(r.upd); o.cleanHours+=r.cleanHours; o.restocks+=r.dirty;
    o.cov+=r.coverage; o.n++;
    if(avgP) o.prices.push(avgP);
    if(r.conf==='high'||o.conf==='none') o.conf=r.conf;
  });
  return Object.values(per).map(o=>{
    const upd=o.upds.reduce((a,b)=>a+b,0)/o.upds.length;  // avg across stores
    const price=o.prices.length?o.prices.reduce((a,b)=>a+b,0)/o.prices.length:null;
    const stores=Math.round((DARK[o.plat]||800)*PEN);
    const monthly=Math.round(upd*stores*30);
    return {...o,upd,price,stores,monthly,gmv:price?monthly*price:null,
            coverage:o.n?o.cov/o.n:0};
  });
}

// latest snapshot state per platform|brand|size
function latest(rows){
  const m={};
  rows.forEach(r=>{
    // product id is the only unique SKU key (names+sizes collide across listings)
    const key=[r.platform,r.platform_product_id||r.brand_sku].join('|');
    const t=new Date(r.snapshot_ts_ist);
    if(!m[key]||t>m[key]._t){ m[key]={...r,_t:t}; }
  });
  return Object.values(m);
}

let charts={};
function render(){
  document.getElementById('empty').style.display='none';
  const times=RAW.map(r=>new Date(r.snapshot_ts_ist)).filter(d=>!isNaN(d));
  const tmin=new Date(Math.min(...times)), tmax=new Date(Math.max(...times));
  const platforms=[...new Set(RAW.map(r=>r.platform))];
  const stores=[...new Set(RAW.map(r=>r.merchant_id).filter(Boolean))];
  const storeTxt = stores.length===1
    ? `store ${stores[0]}`
    : `<span style="color:#E8B84C">${stores.length} stores ⚠</span>`;
  document.getElementById('meta').innerHTML=
    `${F.format(RAW.length)} rows · ${platforms.join(' · ')} · ${storeTxt} · `+
    `${tmin.toLocaleDateString('en-IN')}–${tmax.toLocaleDateString('en-IN')}`;

  const ana=analyze(RAW).sort((a,b)=>b.upd-a.upd);
  const lat=latest(RAW);

  // --- data maturity: tells you honestly whether to trust the sales numbers ---
  const totalClean=ana.reduce((s,a)=>s+a.cleanHours,0);
  const avgCov=ana.length?ana.reduce((s,a)=>s+a.coverage,0)/ana.length:0;
  let dqTitle,dqMsg,dqColor,dqBg;
  if(ana.length===0||totalClean<12){
    dqTitle='⏳ Too early — sales numbers not meaningful yet';
    dqMsg='Prices and stock below are exact and usable right now. But measuring SALES needs stock to move across several readings of the same store. Let it collect for a day, then come back — the estimates sharpen every hour.';
    dqColor='#E8B84C'; dqBg='#2a2416';
  }else if(totalClean<80){
    dqTitle='📈 Building — ranking is usable, rates still settling';
    dqMsg=`${Math.round(totalClean)} clean observation-hours so far. The brand RANKING is already meaningful. Absolute rates will keep firming up over the next few days.`;
    dqColor='#3Fb0a0'; dqBg='#16262a';
  }else if(totalClean<300){
    dqTitle='✅ Good — estimates are reliable';
    dqMsg=`${Math.round(totalClean)} clean observation-hours. Enough to trust the shelf share and the ranking. Keeps improving as more days accumulate.`;
    dqColor='#3Fb0a0'; dqBg='#16262a';
  }else{
    dqTitle='🎯 Strong — mature dataset';
    dqMsg=`${Math.round(totalClean)} clean observation-hours across ${ana.length} SKUs. Weekday/weekend patterns and restock cycles have averaged out.`;
    dqColor='#3Fb0a0'; dqBg='#16262a';
  }
  dqMsg += ` Restock windows (${Math.round((1-avgCov)*100)}% of time) are dropped, never counted as zero sales — that's what stops fast-moving brands being under-counted.`;

  const totMonthly=ana.reduce((s,a)=>s+a.monthly,0);
  const totGmv=ana.reduce((s,a)=>s+(a.gmv||0),0);
  const fastest=ana.length?ana[0]:null;
  const oos=lat.filter(r=>r.state==='out_of_stock').length;
  const isOwn=x=>String(x.is_own).toLowerCase()==='true';
  const ownRows=ana.filter(a=>a.own);
  const ownUpd=ownRows.length?ownRows.reduce((s,a)=>s+a.upd,0)/ownRows.length:null;
  const ownRank=ownRows.length?(ana.findIndex(a=>a.own)+1):null;
  const hasSales=ana.length>0;
  const brands=[...new Set(RAW.map(r=>r.brand).filter(Boolean))].sort();

  document.getElementById('app').innerHTML=`
    <div class="grid cards">
      <div class="card" style="border-color:var(--gold)"><div class="k" style="color:var(--gold)">PoppiGo rank</div>
        <div class="v">${ownRank?('#'+ownRank):'—'}${ownRank?`<small> of ${ana.length}</small>`:''}</div>
        <div class="foot">${ownUpd!==null?ownUpd.toFixed(1)+' u/store/day · vs leader '+(fastest?fastest.upd.toFixed(1):'—'):'waiting for sales data'}</div></div>
      <div class="card"><div class="k">Tracked monthly units</div>
        <div class="v">${hasSales?F.format(totMonthly)+'<small> est</small>':'—'}</div>
        <div class="foot">${hasSales?'across all tracked SKUs':'needs sales data'}</div></div>
      <div class="card"><div class="k">Tracked monthly GMV</div>
        <div class="v" style="font-size:24px">${hasSales?money(totGmv)+'<small> est</small>':'—'}</div>
        <div class="foot">${hasSales?'at current avg selling price':'needs sales data'}</div></div>
      <div class="card"><div class="k">Out of stock now</div>
        <div class="v">${oos}<small> / ${lat.length} SKUs</small></div>
        <div class="foot">OOS = missed sales / high velocity</div></div>
    </div>

    <div class="section" id="dq" style="border-color:${dqColor};background:linear-gradient(180deg,${dqBg},var(--navy2))">
      <h2 style="color:${dqColor}">${dqTitle}</h2>
      <p class="desc" style="margin:0">${dqMsg}</p>
    </div>

    <div class="section" style="border-color:var(--gold)">
      <h2>Brand shelf share <span style="color:var(--gold);font-weight:700;font-size:12px">— BIAS-FREE, no assumptions</span></h2>
      <p class="desc">Of every 100 rupees spent in this category at a dark store, how much goes to each brand. Built <b>only</b> from stock we watched move — no store-count guesses, nothing assumed about who is big. <b style="color:var(--gold)">This is the number to trust. The slider below does not affect it.</b></p>
      <div id="shelf"></div>
    </div>

    <div class="section">
      <h2>Velocity leaderboard <span style="color:var(--mute);font-weight:500;font-size:12px">— ${ana.length} SKUs, ${brands.length} brands</span></h2>
      <p class="desc">Units sold per store per day, from live inventory drops. <b>No assumptions — pure observed data, so this is bias-free.</b> Absolute rupee cards use a store-count assumption; this ranking does not. <b style="color:var(--gold)">Gold = PoppiGo.</b></p>
      <div class="brandbar" id="brandbar"></div>
      <div id="lb"></div>
      <div class="note">A single weekly snapshot can't measure this. It needs multiple snapshots across a day (run <b>tracker.py</b> hourly on one measurement day/week). More snapshots = sharper numbers.</div>
    </div>

    <div class="section" id="chartSection" style="${hasSales?'':'display:none'}">
      <div class="controls">
        <div class="ctl">
          <label>Store-count assumption (affects rupee cards only, NOT the bias-free ranking above)</label>
          <input type="range" id="pen" min="5" max="80" value="${PEN*100}"/>
          <div><span class="valout" id="penv">${Math.round(PEN*100)}%</span> <span class="chip">rough scenario only — shelf share above needs no slider</span></div>
        </div>
        <div class="ctl">
          <label>Focus SKU — stock depletion over time</label>
          <select id="skuSel"></select>
        </div>
      </div>
      <div class="two">
        <div><canvas id="depChart"></canvas></div>
        <div><canvas id="monChart"></canvas></div>
      </div>
    </div>

    <div class="section">
      <h2>Live shelf — latest snapshot</h2>
      <p class="desc">Most recent price, discount, stock and rating per SKU per platform.</p>
      <div style="overflow-x:auto">
      <table id="tbl"><thead><tr>
        <th data-s="platform">Platform</th><th data-s="brand_sku">Product</th><th data-s="size">Size</th>
        <th data-s="price" class="num">Price</th><th data-s="mrp" class="num">MRP</th>
        <th data-s="discount_pct" class="num">Disc%</th><th data-s="inventory" class="num">Stock</th>
        <th data-s="state">State</th><th data-s="rating" class="num">Rating</th>
      </tr></thead><tbody></tbody></table>
      </div>
    </div>`;

  drawShelf(ana);
  drawBrandBar(brands);
  drawLeaderboard(ana);
  buildTable(lat);
  fillSkuSelect(ana);
  drawMonthly(ana);
  document.getElementById('pen').oninput=e=>{
    PEN=e.target.value/100; document.getElementById('penv').textContent=Math.round(PEN*100)+'%';
    const a2=analyze(RAW).sort((x,y)=>y.upd-x.upd); drawMonthly(a2);
    // refresh cards' monthly/gmv
    const tm=a2.reduce((s,a)=>s+a.monthly,0), tg=a2.reduce((s,a)=>s+(a.gmv||0),0);
    document.querySelectorAll('.card .v')[1].innerHTML=F.format(tm)+'<small> est</small>';
    document.querySelectorAll('.card .v')[2].innerHTML=money(tg)+'<small> est</small>';
  };
}

function drawShelf(ana){
  // brand-level revenue per store-day -> share. No store counts involved.
  const by={};
  ana.forEach(a=>{
    const b=a.brandName||'?';
    if(!by[b]) by[b]={brand:b,units:0,rev:0,own:false,skus:0};
    by[b].units+=a.upd;
    by[b].rev+=a.upd*(a.price||0);
    by[b].skus++;
    if(a.own) by[b].own=true;
  });
  const rows=Object.values(by);
  const totR=rows.reduce((s,r)=>s+r.rev,0)||1;
  const totU=rows.reduce((s,r)=>s+r.units,0)||1;
  rows.forEach(r=>{ r.vs=r.rev/totR*100; r.us=r.units/totU*100; });
  rows.sort((a,b)=>b.vs-a.vs);
  const max=rows.length?rows[0].vs:1;
  document.getElementById('shelf').innerHTML=rows.map(r=>`
    <div class="lb-row ${r.own?'own':''}">
      <div class="lb-name">${r.brand}${r.own?'<span class="ownbadge">YOU</span>':''} <span>${r.skus} SKU${r.skus>1?'s':''}</span></div>
      <div class="lb-track"><div class="lb-fill" style="width:${Math.max(2,100*r.vs/max)}%"></div></div>
      <div class="lb-val">${r.vs.toFixed(1)}%<small>${r.us.toFixed(1)}% of units</small></div>
    </div>`).join('') || '<div style="color:var(--mute);padding:16px">Not enough snapshots yet — needs stock to move between two readings of the same store.</div>';
}

let BRAND_FILTER=new Set();
function drawBrandBar(brands){
  const bb=document.getElementById('brandbar');
  bb.innerHTML=`<div class="bchip ${BRAND_FILTER.size===0?'on':''}" data-b="__all">All brands</div>`+
    brands.map(b=>`<div class="bchip ${b==='PoppiGo'?'own':''} ${BRAND_FILTER.has(b)?'on':''}" data-b="${b}">${b}</div>`).join('');
  bb.querySelectorAll('.bchip').forEach(c=>c.onclick=()=>{
    const b=c.dataset.b;
    if(b==='__all') BRAND_FILTER.clear();
    else { BRAND_FILTER.has(b)?BRAND_FILTER.delete(b):BRAND_FILTER.add(b); }
    drawBrandBar(brands);
    drawLeaderboard(analyze(RAW).sort((x,y)=>y.upd-x.upd));
  });
}
function drawLeaderboard(ana){
  const show=BRAND_FILTER.size?ana.filter(a=>BRAND_FILTER.has(a.brandName)):ana;
  const max=Math.max(...show.map(a=>a.upd),1);
  document.getElementById('lb').innerHTML=show.map((a,i)=>`
    <div class="lb-row ${a.own?'own':''}">
      <div class="lb-name">${a.brand}${a.own?'<span class="ownbadge">YOU</span>':''} <span>${a.size||''} ${a.plat}</span></div>
      <div class="lb-track"><div class="lb-fill" style="width:${Math.max(3,100*a.upd/max)}%"></div></div>
      <div class="lb-val">${a.upd.toFixed(1)}<small>u/store/day</small></div>
    </div>`).join('') || `<div style="color:var(--mute);padding:20px">${
      ana.length===0
        ? 'No sales measured yet. Stock has to move between two readings of the same store — usually visible within a day of hourly runs.'
        : 'No SKUs match that brand filter.'}</div>`;
}

function buildTable(lat){
  const tb=document.querySelector('#tbl tbody');
  const rowsHtml=lat.sort((a,b)=>(a.brand_sku+a.size).localeCompare(b.brand_sku+b.size)).map(r=>{
    const inv=toNum(r.inventory);
    let pill='<span class="pill ok">in stock</span>';
    if(r.state==='out_of_stock'||inv===0)pill='<span class="pill oos">out</span>';
    else if(inv!==null&&inv<=2)pill='<span class="pill low">low ('+inv+')</span>';
    const disc=toNum(r.discount_pct);
    const own=String(r.is_own).toLowerCase()==='true';
    return `<tr class="${own?'own':''}">
      <td><span class="plat ${r.platform}">${(r.platform||'').toUpperCase()}</span></td>
      <td>${r.brand_sku}${own?'<span class="ownbadge">YOU</span>':''}</td><td>${r.size}</td>
      <td class="num">${r.price?money(toNum(r.price)):'—'}</td>
      <td class="num" style="color:var(--mute)">${r.mrp?money(toNum(r.mrp)):'—'}</td>
      <td class="num">${disc?disc.toFixed(0)+'%':'—'}</td>
      <td class="num">${inv!==null?inv:'—'}</td>
      <td>${pill}</td>
      <td class="num">${r.rating||'—'}</td></tr>`;
  }).join('');
  tb.innerHTML=rowsHtml;
  document.querySelectorAll('#tbl th').forEach(th=>th.onclick=()=>sortTable(th.dataset.s));
}
let sortDir={};
function sortTable(col){
  sortDir[col]=!sortDir[col];
  const lat=latest(RAW);
  const num=['price','mrp','discount_pct','inventory','rating'].includes(col);
  lat.sort((a,b)=>{
    let x=a[col],y=b[col];
    if(num){x=toNum(x)||0;y=toNum(y)||0;return sortDir[col]?x-y:y-x;}
    return sortDir[col]?(''+x).localeCompare(''+y):(''+y).localeCompare(''+x);
  });
  buildTableSorted(lat);
}
function buildTableSorted(lat){ // avoid re-sorting default
  const tb=document.querySelector('#tbl tbody');
  tb.innerHTML=lat.map(r=>{
    const inv=toNum(r.inventory);
    let pill='<span class="pill ok">in stock</span>';
    if(r.state==='out_of_stock'||inv===0)pill='<span class="pill oos">out</span>';
    else if(inv!==null&&inv<=2)pill='<span class="pill low">low ('+inv+')</span>';
    const disc=toNum(r.discount_pct);
    const own=String(r.is_own).toLowerCase()==='true';
    return `<tr class="${own?'own':''}">
      <td><span class="plat ${r.platform}">${(r.platform||'').toUpperCase()}</span></td>
      <td>${r.brand_sku}${own?'<span class="ownbadge">YOU</span>':''}</td><td>${r.size}</td>
      <td class="num">${r.price?money(toNum(r.price)):'—'}</td>
      <td class="num" style="color:var(--mute)">${r.mrp?money(toNum(r.mrp)):'—'}</td>
      <td class="num">${disc?disc.toFixed(0)+'%':'—'}</td>
      <td class="num">${inv!==null?inv:'—'}</td>
      <td>${pill}</td><td class="num">${r.rating||'—'}</td></tr>`;
  }).join('');
}

function fillSkuSelect(ana){
  const sel=document.getElementById('skuSel');
  if(!sel) return;
  if(!ana.length){ sel.innerHTML='<option>No sales data yet</option>'; return; }
  sel.innerHTML=ana.map(a=>`<option value="${a.plat}|${a.pid}">${a.brand} · ${a.size||''} · ${a.plat}</option>`).join('');
  sel.onchange=()=>drawDepletion(sel.value);
  drawDepletion(sel.value||`${ana[0].plat}|${ana[0].pid}`);
}

function drawDepletion(key){
  if(!key||key==='undefined') return;
  const [plat,pid]=key.split('|');
  const pts=RAW.filter(r=>r.platform===plat&&(r.platform_product_id||r.brand_sku)===pid&&toNum(r.inventory)!==null)
    .map(r=>({t:new Date(r.snapshot_ts_ist),inv:toNum(r.inventory),name:r.brand_sku}))
    .sort((a,b)=>a.t-b.t);
  if(!pts.length) return;
  const nm=pts[0].name||'';
  const labels=pts.map(p=>p.t.toLocaleString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}));
  if(charts.dep)charts.dep.destroy();
  charts.dep=new Chart(document.getElementById('depChart'),{
    type:'line',
    data:{labels,datasets:[{label:'Units in stock',data:pts.map(p=>p.inv),
      borderColor:'#E85D4C',backgroundColor:'rgba(232,93,76,.12)',fill:true,tension:.3,
      pointRadius:2,pointBackgroundColor:'#C9A876'}]},
    options:{plugins:{legend:{labels:{color:'#EAF0FB'}},
      title:{display:true,text:`${nm} — stock over time (each drop = a sale)`,color:'#8fa3c9',font:{size:12}}},
      scales:{x:{ticks:{color:'#8fa3c9',maxTicksLimit:8,font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#8fa3c9'},grid:{color:'rgba(255,255,255,.06)'},beginAtZero:true}}}
  });
}

function drawMonthly(ana){
  const top=ana.slice(0,9);
  const el=document.getElementById('monChart'); if(!el) return;
  if(!top.length){ if(charts.mon)charts.mon.destroy(); return; }
  if(charts.mon)charts.mon.destroy();
  charts.mon=new Chart(document.getElementById('monChart'),{
    type:'bar',
    data:{labels:top.map(a=>a.brand.length>16?a.brand.slice(0,16)+'…':a.brand+' '+a.size),
      datasets:[{label:'Est. monthly units',data:top.map(a=>a.monthly),
        backgroundColor:'#3Fb0a0',borderRadius:5}]},
    options:{indexAxis:'y',plugins:{legend:{display:false},
      title:{display:true,text:'Estimated monthly units by SKU (tune with slider)',color:'#8fa3c9',font:{size:12}}},
      scales:{x:{ticks:{color:'#8fa3c9',font:{size:9}},grid:{color:'rgba(255,255,255,.05)'}},
        y:{ticks:{color:'#EAF0FB',font:{size:10}},grid:{display:false}}}}
  });
}
