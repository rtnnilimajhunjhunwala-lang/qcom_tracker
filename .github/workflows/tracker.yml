name: Publish dashboard

# ------------------------------------------------------------------
# NOTE: Blinkit blocks GitHub's servers (403), so data is NOT collected
# here. It's collected on a real Mumbai connection by the double-click
# "Collect Poppigo Data" app on your Mac, which pushes the CSV here.
# This workflow's ONLY job is to republish the dashboard whenever new
# data arrives (or on a daily heartbeat).
# ------------------------------------------------------------------
on:
  push:
    paths:
      - 'data/**'          # republish whenever the Mac pushes new data
      - 'dashboard.html'
      - 'index.html'
  workflow_dispatch: {}
  schedule:
    - cron: "30 3 * * *"   # daily heartbeat (rebuild page even if nothing changed)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        run: |
          mkdir -p _site/data
          cp dashboard.html _site/index.html
          cp data/snapshots.csv     _site/data/ 2>/dev/null || true
          cp data/market_share.csv  _site/data/ 2>/dev/null || true
          cp data/estimates.csv     _site/data/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
